name: Docs

on:
  pull_request:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/**'

jobs:
  validate-readme:
    name: Validate README
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Check required sections
        run: |
          missing=""
          for section in "## Installation" "## Quickstart" "## Examples" "## Troubleshooting"; do
            if ! grep -q "$section" README.md; then
              missing="$missing\n  - $section"
            fi
          done
          if [ -n "$missing" ]; then
            echo "Missing required README sections:$missing"
            exit 1
          fi
          echo "All required sections present."
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress README.md
          fail: true
